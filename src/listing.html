<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{PATH}} — tunnelist</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0C0C0C;color:#DDDDDD;min-height:100vh;font-family:Consolas,'Courier New',monospace}
    .wrap{max-width:56rem;margin:0 auto;border-left:1px solid #1D1D1D;border-right:1px solid #1D1D1D;min-height:100vh}
    .crumbs{display:flex;align-items:center;padding:0 1rem;height:36px;border-bottom:1px solid #1D1D1D}
    .col-head{display:flex;align-items:center;padding:0 1rem;background:#111111;border-bottom:1px solid #1D1D1D;height:28px}
    .lbl{font-size:10px;color:#454545;letter-spacing:1.4px;font-weight:600;text-transform:uppercase}
    .row{display:flex;align-items:center;padding:0 1rem;border-bottom:1px solid #1D1D1D;height:34px;text-decoration:none;transition:background 80ms}
    .row:hover{background:#111111}
    .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .dim{font-size:11px;color:#454545;text-align:right;flex-shrink:0}
    .footer{display:flex;align-items:center;border-top:1px solid #1D1D1D;padding:0 1rem;height:40px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="crumbs">{{BREADCRUMBS}}</div>
    <div class="col-head">
      <div style="width:22px"></div>
      <div class="lbl" style="flex:1">Name</div>
      <div class="lbl" style="width:72px;text-align:right">Size</div>
      <div style="width:16px"></div>
      <div class="lbl" style="width:90px;text-align:right">Modified</div>
      <div style="width:36px"></div>
    </div>
    <div>{{ROWS}}</div>
    <div class="footer"><span class="lbl">{{COUNT}} item{{COUNT_PLURAL}} &middot; tunnelist</span></div>
  </div>
</body>
</html>
